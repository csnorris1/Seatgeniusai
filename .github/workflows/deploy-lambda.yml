name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'api/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package and deploy to Lambda
        run: |
          zip -j function.zip api/search.js
          aws lambda update-function-code \
            --function-name seatgenius-search \
            --zip-file fileb://function.zip \
            --region us-east-2
          aws lambda wait function-updated \
            --function-name seatgenius-search \
            --region us-east-2
          aws lambda update-function-configuration \
            --function-name seatgenius-search \
            --handler search.handler \
            --runtime nodejs22.x \
            --timeout 29 \
            --memory-size 256 \
            --region us-east-2

      - name: Verify deployment
        run: |
          sleep 5
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://vebhfm3r55.execute-api.us-east-2.amazonaws.com/search?action=events&team=Yankees")
          STATUS=$(echo "$RESPONSE" | tail -1)
          echo "API status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::API returned $STATUS after deploy"
            exit 1
          fi
