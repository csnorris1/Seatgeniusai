name: Site Monitor

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch: # allow manual runs

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check frontend loads
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://seatgeniusai.vercel.app)
          echo "Frontend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Frontend returned $STATUS"
            exit 1
          fi

      - name: Check API events endpoint
        run: |
          RESPONSE=$(curl -s "https://vebhfm3r55.execute-api.us-east-2.amazonaws.com/search?action=events&team=New%20York%20Yankees")
          echo "API response: $RESPONSE"

          # Check it's valid JSON with an events array
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          events = data.get('events', [])
          print(f'Events returned: {len(events)}')
          if not isinstance(events, list):
              print('::error::events is not a list')
              sys.exit(1)
          if len(events) == 0:
              print('::warning::No events returned — API may be down or key expired')
          "

      - name: Check API listings endpoint
        run: |
          # First get an event ID
          EVENT_ID=$(curl -s "https://vebhfm3r55.execute-api.us-east-2.amazonaws.com/search?action=events&team=Chicago%20Cubs" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          events = data.get('events', [])
          if events:
              print(events[0]['id'])
          else:
              print('')
          ")

          if [ -z "$EVENT_ID" ]; then
            echo "::warning::No event ID to test listings — skipping"
            exit 0
          fi

          RESPONSE=$(curl -s "https://vebhfm3r55.execute-api.us-east-2.amazonaws.com/search?action=listings&event_id=$EVENT_ID")
          echo "Listings response: $RESPONSE"

          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print(f'::error::Listings error: {data[\"error\"]}')
              sys.exit(1)
          listings = data.get('listings', [])
          buy_url = data.get('buy_url')
          print(f'Listings: {len(listings)}, Buy URL: {buy_url}')
          "
