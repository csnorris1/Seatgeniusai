name: Deploy WC Tracker

on:
  push:
    branches: [main]
    paths:
      - 'wc-tracker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp wc-tracker/wc2026-bracket.html \
            s3://seatgenius-wc-tracker/wc-tracker.html \
            --content-type "text/html"

      - name: Verify live
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://seatgenius-wc-tracker.s3.us-east-2.amazonaws.com/wc-tracker.html")
          echo "Live status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned $STATUS after deploy"
            exit 1
          fi
